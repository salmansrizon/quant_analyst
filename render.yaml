# render.yaml — LankaBD Data Lake on Render
# Each Docker service uses CMD in its own Dockerfile — no startCommand allowed
# Deploy: render.com → New → Blueprint → connect GitHub repo

services:

  # ── Dagster Webserver (free web service) ─────────────────────────────────────
  # CMD in docker/Dockerfile: dagster-webserver -h 0.0.0.0 -p $PORT -m definitions
  - type: web
    name: lankabd-dagster
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /server_info
    envVars:
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /data
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

  # ── Dagster Daemon (starter worker — must be always-on for schedules) ─────────
  # CMD in docker/Dockerfile.daemon: dagster-daemon run -m definitions
  - type: worker
    name: lankabd-dagster-daemon
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.daemon
    dockerContext: .
    plan: starter
    region: oregon
    envVars:
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /data
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

  # ── Apache Superset (starter web service) ────────────────────────────────────
  # CMD in superset/Dockerfile.superset: superset init + gunicorn
  - type: web
    name: lankabd-superset
    runtime: docker
    dockerfilePath: ./superset/Dockerfile.superset
    dockerContext: ./superset
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: SUPERSET_SECRET_KEY
        generateValue: true
      - key: SUPERSET_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lankabd-superset-db
          property: connectionString

  # ── Daily Scraper Cron Job ────────────────────────────────────────────────────
  # CMD in docker/Dockerfile.cron: runs full pipeline then exits
  # Note: no disk — data is written to Postgres via pg_loader.py
  - type: cron
    name: lankabd-scraper-daily
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.cron
    dockerContext: .
    plan: starter
    region: oregon
    schedule: "0 6 * * *"
    envVars:
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /tmp/data
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

databases:

  # ── Dagster metadata + lake.* tables ─────────────────────────────────────────
  - name: lankabd-postgres
    databaseName: dagster
    user: dagster
    plan: free
    region: oregon
    postgresMajorVersion: "16"

  # ── Superset metadata ─────────────────────────────────────────────────────────
  - name: lankabd-superset-db
    databaseName: superset
    user: superset
    plan: free
    region: oregon
    postgresMajorVersion: "16"
