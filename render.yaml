# render.yaml — LankaBD Data Lake on Render
# Deploy: render.com → New → Blueprint → connect GitHub repo

services:

  # ── Dagster Webserver ─────────────────────────────────────────────────────────
  - type: web
    name: lankabd-dagster
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    disk:
      name: lake-data
      mountPath: /data
      sizeGB: 10
    startCommand: dagster-webserver -h 0.0.0.0 -p $PORT -m definitions
    healthCheckPath: /server_info
    envVars:
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /data
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

  # ── Dagster Daemon ────────────────────────────────────────────────────────────
  - type: worker
    name: lankabd-dagster-daemon
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    disk:
      name: lake-data-daemon
      mountPath: /data
      sizeGB: 10
    startCommand: dagster-daemon run -m definitions
    envVars:
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /data
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

  # ── Apache Superset ───────────────────────────────────────────────────────────
  - type: web
    name: lankabd-superset
    runtime: docker
    dockerfilePath: ./superset/Dockerfile.superset
    dockerContext: ./superset
    plan: starter
    region: oregon
    startCommand: >-
      sh -c "superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@lankabd.com --password $SUPERSET_ADMIN_PASSWORD 2>/dev/null || true &&
      superset init &&
      gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 'superset.app:create_app()'"
    healthCheckPath: /health
    envVars:
      - key: SUPERSET_SECRET_KEY
        generateValue: true
      - key: SUPERSET_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lankabd-superset-db
          property: connectionString

  # ── Daily Scraper Cron Job ────────────────────────────────────────────────────
  - type: cron
    name: lankabd-scraper-daily
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    schedule: "0 6 * * *"
    disk:
      name: lake-data-cron
      mountPath: /data
      sizeGB: 10
    startCommand: >-
      sh -c "cd /opt/scrapers &&
      python dataGrid.py &&
      python priceArchive.py &&
      python announcement.py &&
      python csv_to_parquet.py &&
      python pg_loader.py"
    envVars:
      - key: PYTHONPATH
        value: /opt/scrapers
      - key: DATA_ROOT
        value: /data
      - key: DAGSTER_HOME
        value: /dagster_home
      - key: DAGSTER_PG_HOST
        fromDatabase:
          name: lankabd-postgres
          property: host
      - key: DAGSTER_PG_USER
        fromDatabase:
          name: lankabd-postgres
          property: user
      - key: DAGSTER_PG_PASSWORD
        fromDatabase:
          name: lankabd-postgres
          property: password
      - key: DAGSTER_PG_DB
        fromDatabase:
          name: lankabd-postgres
          property: database

databases:

  # ── Dagster metadata + lake data tables ──────────────────────────────────────
  - name: lankabd-postgres
    databaseName: dagster
    user: dagster
    plan: free
    region: oregon
    postgresMajorVersion: "16"

  # ── Superset metadata ─────────────────────────────────────────────────────────
  - name: lankabd-superset-db
    databaseName: superset
    user: superset
    plan: free
    region: oregon
    postgresMajorVersion: "16"
